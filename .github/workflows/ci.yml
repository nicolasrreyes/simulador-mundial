name: CI — Simulador Mundial 2026

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ① Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff check
        run: ruff check . --output-format=github
      - name: Fail on major findings
        if: failure()
        run: |
          echo "::error::Ruff encontró hallazgos MAJOR — pipeline detenido"
          exit 1

  tests:
    name: ② Tests + Coverage
    needs: lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: python -m pytest tests/ --cov=. --cov-report=xml --ignore=tests/test_frontend_smoke.py -q
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  quality-gate:
    name: ③ Quality Gate
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Check coverage threshold
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib['line-rate'])
          threshold = 0.80
          print(f'Cobertura actual: {line_rate:.2%}')
          if line_rate < threshold:
              print(f'::error::Quality Gate FAIL: cobertura {line_rate:.2%} < {threshold:.0%}')
              exit(1)
          else:
              print(f'Quality Gate PASS: cobertura {line_rate:.2%} >= {threshold:.0%}')
          "
